name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target universal-apple-darwin
            targets: aarch64-apple-darwin,x86_64-apple-darwin
          - platform: windows-latest
            args: ''
            targets: ''
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.targets }}
      - run: npm ci
      - name: Validate GitHub App build variables
        run: |
          if [ -z "${{ vars.SKILL_SYNC_GITHUB_APP_CLIENT_ID }}" ]; then
            echo "::error::SKILL_SYNC_GITHUB_APP_CLIENT_ID repository variable is empty"
            exit 1
          fi
          if [ -z "${{ vars.SKILL_SYNC_GITHUB_APP_SLUG }}" ]; then
            echo "::error::SKILL_SYNC_GITHUB_APP_SLUG repository variable is empty"
            exit 1
          fi
        shell: bash
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # 公开 repository variables（非 secrets），build.rs 注入为编译期 env!
          SKILL_SYNC_GITHUB_APP_CLIENT_ID: ${{ vars.SKILL_SYNC_GITHUB_APP_CLIENT_ID }}
          SKILL_SYNC_GITHUB_APP_SLUG: ${{ vars.SKILL_SYNC_GITHUB_APP_SLUG }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Skill Sync v__VERSION__'
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
