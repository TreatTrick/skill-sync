<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Skill Sync icon</title>
  <desc id="desc">A desktop app icon showing skill nodes orbiting a central sync core.</desc>
  <defs>
    <radialGradient id="ambient" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(166 116) rotate(54) scale(382)">
      <stop stop-color="#2DD4BF" stop-opacity="0.34"/>
      <stop offset="0.48" stop-color="#60A5FA" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#0B1120" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="borderGradient" x1="72" y1="54" x2="440" y2="458" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2DD4BF"/>
      <stop offset="0.58" stop-color="#38BDF8"/>
      <stop offset="1" stop-color="#A78BFA"/>
    </linearGradient>
    <linearGradient id="orbitTop" x1="180" y1="64" x2="440" y2="386" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2DD4BF"/>
      <stop offset="1" stop-color="#60A5FA"/>
    </linearGradient>
    <linearGradient id="orbitBottom" x1="72" y1="126" x2="332" y2="448" gradientUnits="userSpaceOnUse">
      <stop stop-color="#60A5FA"/>
      <stop offset="1" stop-color="#A78BFA"/>
    </linearGradient>
    <linearGradient id="coreAccent" x1="202" y1="200" x2="314" y2="314" gradientUnits="userSpaceOnUse">
      <stop stop-color="#14B8A6"/>
      <stop offset="0.58" stop-color="#38BDF8"/>
