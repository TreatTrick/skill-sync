    </linearGradient>
    <filter id="softShadow" x="44" y="44" width="424" height="424" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#020617" flood-opacity="0.34"/>
    </filter>
    <filter id="nodeShadow" x="80" y="76" width="352" height="352" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#020617" flood-opacity="0.28"/>
    </filter>
  </defs>

  <rect x="32" y="32" width="448" height="448" rx="112" fill="#0B1120"/>
  <rect x="35" y="35" width="442" height="442" rx="109" stroke="url(#borderGradient)" stroke-opacity="0.55" stroke-width="6"/>
  <circle cx="256" cy="256" r="224" fill="url(#ambient)"/>
  <path d="M87 256C87 163 163 87 256 87C347 87 421 158 425 248" stroke="#1E293B" stroke-width="28" stroke-linecap="round"/>
  <path d="M425 256C425 349 349 425 256 425C165 425 91 354 87 264" stroke="#172033" stroke-width="28" stroke-linecap="round"/>

  <path d="M256 76C356 76 437 157 437 257C437 307 417 352 386 384" stroke="url(#orbitTop)" stroke-width="18" stroke-linecap="round"/>
  <path d="M384 384L392 343L424 370" stroke="#60A5FA" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M256 436C156 436 75 355 75 255C75 205 95 160 126 128" stroke="url(#orbitBottom)" stroke-width="18" stroke-linecap="round"/>
  <path d="M128 128L120 169L88 142" stroke="#A78BFA" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>

  <g filter="url(#nodeShadow)">
