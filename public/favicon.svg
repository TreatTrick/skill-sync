    </g>
    <g>
      <rect x="342" y="112" width="72" height="72" rx="22" fill="#0D2440" stroke="#38BDF8" stroke-width="6"/>
      <path d="M363 137H393M363 157H384" stroke="#D9F3FF" stroke-width="8" stroke-linecap="round"/>
    </g>
    <g>
